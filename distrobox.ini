# claudebox — the in-fedora-dev workshop where Claude Code lives.
# Rebuilt DAILY (04:00 timer + ad-hoc trigger + in-box flag).
#
# LIVE spec lives at /home/core/.local/share/fedora-dev/distrobox.ini (a git
# clone on the home volume that persists across fedora-dev container recreations).
# This file is the BAKED SEED used on first boot if the live clone doesn't exist.
# Once the live clone exists, this baked copy is ignored.
[claudebox]
image=quay.io/fedora/fedora-toolbox:44
pull=true
replace=false
# Do NOT add init=true: distrobox-create gates the host /run/user/<uid> bind-mount
# on init=0, so an initful box silently drops that mount — the host podman socket
# vanishes from the box and CONTAINER_HOST breaks with no build-time error, only
# at the first in-box podman call.

# Anthropic's official dnf repo must exist BEFORE package install. Channel = `latest`
# (every Claude Code release the moment it ships) so the daily box rebuild keeps the
# CLI current and new models are accessible day one. GPG key fingerprint:
# 31DD DE24 DDFA B679 F42D 7BD2 BAA9 29FF 1A7E CACE.
#
# HOOK QUOTING IS LOAD-BEARING AND DOUBLY-TRAPPED — keep ONLY trivial, single-quoted
# commands here:
#   * distrobox-assemble's sanitize_variable() wraps any hook containing a DOUBLE
#     quote in single quotes WITHOUT escaping the interior single quotes — so a
#     hook mixing '...' and "..." (or any for/do/done) detonates assemble's eval.
#   * distrobox-create then embeds the joined INIT hooks as `-- '<hook>'`
#     (single-quoted) and re-evals the whole create command ON THE HOST. Any single
#     quote in an init_hook breaks out of that wrapper, so the hook body runs as
#     the unprivileged HOST user — Permission denied writing /etc, /usr/local/bin.
#     (PRE-init hooks are double-quote-wrapped by create, so the single quotes in
#     the pre_init_hook below DO survive — that is why this repo write can stay here.)
# Rule: a hook here is single-quoted only, no double quotes, no shell keywords.
# Anything needing redirects, symlinks, or its own quoting is applied AFTER assemble
# over the quote-safe `distrobox enter -- sudo` channel — see claudebox-init.sh
# (host bridges) and claudebox-assemble.sh (policy stamping).
pre_init_hooks=sh -c 'set -f; echo [claude-code] > /etc/yum.repos.d/claude-code.repo; echo name=Claude Code >> /etc/yum.repos.d/claude-code.repo; echo baseurl=https://downloads.claude.ai/claude-code/rpm/latest >> /etc/yum.repos.d/claude-code.repo; echo enabled=1 >> /etc/yum.repos.d/claude-code.repo; echo gpgcheck=1 >> /etc/yum.repos.d/claude-code.repo; echo gpgkey=https://downloads.claude.ai/keys/claude-code.asc >> /etc/yum.repos.d/claude-code.repo'

# Box packages. Each entry needs a justifying row in README.md's Box Packages
# table. To add: edit this line in the LIVE clone, add the table row, commit,
# and `gh pr create`. The user reviews; the next rebuild applies it.
additional_packages=claude-code git gh openssh-clients podman bubblewrap socat host-spawn rclone
