name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Monthly --no-cache rebuild on the 15th at 04:00 UTC. The in-container
    # claudebox already refreshes claude-code DAILY from Anthropic's `latest`
    # channel, so the base only needs to pick up upstream RPM updates (Fedora,
    # tailscale, distrobox, the desktop/app repos: Microsoft, 1Password, plus a
    # fresh Obsidian AppImage + the pinned Apache/rclone artifacts). Monthly is
    # plenty. The HOST-side image refresh respects an in-box session lock so this
    # cron doesn't kill mid-flight work (see fedora-bootstrap).
    - cron: "0 4 15 * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: read
  # (no id-token: cosign now signs with a KEY, not keyless OIDC — see "Sign image".)

jobs:
  # ==========================================================================
  # CONTROL-PLANE DIFF-GUARD (per policy/CLAUDE.md "THE PROMOTION GATE").
  #
  # The promotion gate's MECHANICAL enforcement lives in the box (the managed
  # PreToolUse hook + managed-settings). This job is the CI-side backstop: it
  # FAILS any PR that touches a guardrail / control-plane file UNLESS the PR
  # carries an explicit waiver label (`control-plane-approved`). It makes a
  # control-plane change impossible to land silently — a reviewer must (a) see
  # it isolated and (b) apply the label by hand. Mirrors the law's rule that
  # control-plane/guardrail changes are STANDALONE, single-purpose, never
  # bundled, and only land on explicit approval.
  #
  # Runs only on pull_request (a push to main has already passed review +
  # carried the label, or is the maintainer's own self-deploy promotion).
  # ==========================================================================
  control-plane-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect control-plane / guardrail changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Guardrail / control-plane file globs — the exact classes the law
          # names: policy, managed-settings, the promotion-gate hook, every
          # Quadlet, CI itself, the key-sync helper, run.sh, and the box-rebuild
          # control machinery. A diff touching ANY of these is "control-plane".
          PATTERNS='
          ^policy/
          ^.github/workflows/
          (^|/)managed-settings\.json$
          (^|/).*\.container$
          (^|/)run\.sh(\.[a-z0-9]+)?$
          (^|/)sync-authorized-keys\.sh$
          (^|/)gate-push\.sh$
          (^|/)box-rebuild\.sh$
          (^|/)claudebox-(assemble|init|daily)\.sh$
          ^bin/(claude|claudebox-rebuild)$
          (^|/).*sudoers.*$
          '
          # Build a single ERE from the non-empty lines.
          ERE=$(printf '%s\n' "$PATTERNS" | sed '/^[[:space:]]*$/d' | paste -sd'|' -)
          echo "Using control-plane ERE: $ERE"

          # Self-test: the ERE MUST match every control-plane path the law names.
          # Guards against a future anchor/typo regression (this is the bug that let
          # run.sh.grd slip through). A miss here FAILS the build, not silently passes.
          for p in run.sh run.sh.grd fedora-desktop.container \
                   policy/hooks/gate-push.sh policy/managed-settings.json policy/CLAUDE.md \
                   .github/workflows/build.yml sync-authorized-keys.sh \
                   box-rebuild.sh claudebox-assemble.sh claudebox-init.sh claudebox-daily.sh \
                   bin/claude bin/claudebox-rebuild policy/sudoers.claudebox; do
            printf '%s\n' "$p" | grep -Eq "$ERE" \
              || { echo "::error title=Diff-guard ERE self-test failed::pattern set no longer matches control-plane path '$p'"; exit 1; }
          done
          echo "control-plane ERE self-test passed (all named guardrail paths match)"

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files in this PR:"
          echo "$CHANGED"

          HITS=$(printf '%s\n' "$CHANGED" | grep -E "$ERE" || true)
          if [ -n "$HITS" ]; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
            {
              echo "files<<EOF"
              echo "$HITS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce the waiver label on control-plane changes
        if: steps.detect.outputs.touched == 'true'
        env:
          # Evaluated at workflow trigger time against the PR's labels array.
          # `contains(array, item)` is an exact element match — robust against
          # label names with spaces/punctuation (no string-split needed).
          HAS_WAIVER: ${{ contains(github.event.pull_request.labels.*.name, 'control-plane-approved') }}
        run: |
          set -euo pipefail
          echo "::group::Control-plane / guardrail files touched by this PR"
          cat <<'FILES'
          ${{ steps.detect.outputs.files }}
          FILES
          echo "::endgroup::"

          if [ "$HAS_WAIVER" = "true" ]; then
            echo "Waiver label 'control-plane-approved' present — control-plane change is explicitly approved."
            exit 0
          fi

          echo "::error title=Control-plane change without waiver::This PR edits guardrail / control-plane files (listed above) but does NOT carry the 'control-plane-approved' label."
          cat <<'MSG'

          ────────────────────────────────────────────────────────────────────
          CONTROL-PLANE GUARD FAILED

          This PR touches a guardrail / control-plane file (policy/**,
          managed-settings.json, .github/workflows/**, a *.container Quadlet,
          run.sh, sync-authorized-keys.sh, the promotion-gate hook, or the
          box-rebuild control machinery).

          Per policy/CLAUDE.md "THE PROMOTION GATE", such a change MUST be:
            * STANDALONE and single-purpose (never bundled with a feature change),
            * explicitly approved by the maintainer.

          To land it: a maintainer reviews the isolated diff and applies the
          'control-plane-approved' label, then re-runs this check. The label is
          the deliberate, human, per-PR waiver — there is no auto-bypass.
          ────────────────────────────────────────────────────────────────────
          MSG
          exit 1

  # ==========================================================================
  # BUILD + COSIGN-SIGN + PUSH to ghcr.io/oso-gato/fedora-desktop.
  #
  # On pull_request: BUILD-ONLY validation (push: false, no registry write) and
  # gated behind the control-plane-guard so a guardrail PR can't even build
  # without its waiver. On push to main / cron / dispatch: build, push, sign.
  # ==========================================================================
  build:
    needs: control-plane-guard
    # `needs` would skip this job if control-plane-guard is skipped (it only
    # runs on pull_request). always() + an explicit success/skip check keeps the
    # push/cron/dispatch paths building while still blocking on a FAILED guard.
    if: always() && (needs.control-plane-guard.result == 'success' || needs.control-plane-guard.result == 'skipped')
    runs-on: ubuntu-latest
    # MATRIX — build + publish each LINEAGE. fail-fast:false so one variant failing
    # NEVER blocks the other from publishing. xrdp is the PROVEN lineage (:xrdp = :latest);
    # grd is EXPERIMENTAL (Wayland, systemd-PID-1): it ASSEMBLY-builds here on a real
    # runner, but its RUNTIME (booting the session) is host-validation-only — a green
    # build means "image published", NOT "boots".
    # Tags are LINEAGE names: :xrdp :grd (+ :latest = :xrdp). The xrdp lineage's DE is
    # XFCE (DESKTOP_ENV=xfce) — its tag is the lineage name since it is the sole variant.
    # (krdp REMOVED: KRdp has no headless mode. KDE/MATE/LXQt xrdp variants DROPPED — KDE is
    #  GPU-assuming/janky under llvmpipe; MATE adds nothing over XFCE; and "LXQt is lighter"
    #  INVERTS here — this image already keeps the GTK3 stack resident for Firefox/Electron,
    #  so XFCE rides it while LXQt adds a net-new Qt6/KF6 (+ a Fedora-44 Mir/Wayland) runtime
    #  nothing else uses. XFCE is the fit pick.)
    strategy:
      fail-fast: false
      matrix:
        include:
          - { tag: xrdp, file: Containerfile,      desktop_env: xfce, latest: "true" }
          - { tag: grd,  file: Containerfile.grd }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Compute tags (per variant)
        id: meta
        env:
          OWNER: ${{ github.repository_owner }}
          TAG: ${{ matrix.tag }}
          IS_LATEST: ${{ matrix.latest }}
        run: |
          d=$(date +%Y%m%d); img="ghcr.io/${OWNER}/fedora-desktop"
          {
            echo "tags<<EOF"
            echo "${img}:${TAG}"
            echo "${img}:${TAG}-${d}"
            echo "${img}:${TAG}-${GITHUB_SHA::7}"
            if [ "${IS_LATEST}" = "true" ]; then echo "${img}:latest"; fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # PRINCIPLE 2(c) mechanical backstop: every executable on $PATH in the built
      # image must be owned by an rpm, except the repo's own COPY'd wrappers. Runs per
      # variant (the matrix Containerfile + DESKTOP_ENV); the allowlist covers all
      # three lineage entrypoints. A smuggled class-(c) loose binary fails the build.
      - name: No-loose-binary backstop (Principle 2c)
        env:
          FILE: ${{ matrix.file }}
          DE: ${{ matrix.desktop_env }}
        run: |
          docker build ${DE:+--build-arg DESKTOP_ENV=$DE} -f "$FILE" -t fd-loosecheck .
          docker run --rm --entrypoint bash fd-loosecheck -c '
            allow="/usr/local/bin/entrypoint.sh /usr/local/bin/entrypoint-grd.sh /usr/local/bin/claude /usr/local/bin/claudebox-rebuild"
            bad=0
            IFS=:
            for d in $PATH; do
              [ -d "$d" ] || continue
              for f in "$d"/*; do
                [ -f "$f" ] && [ -x "$f" ] || continue
                case " $allow " in *" $f "*) continue ;; esac
                # rpm-owned directly, OR a symlink whose target is rpm-owned (e.g. the
                # 1Password vendor symlink /usr/bin/1password -> /opt/1Password/1password).
                # A genuinely loose binary fails BOTH checks.
                rpm -qf "$f" >/dev/null 2>&1 || rpm -qf "$(readlink -f "$f")" >/dev/null 2>&1 \
                  || { echo "NON-RPM ON PATH: $f"; bad=1; }
              done
            done
            [ "$bad" = 0 ] || { echo "::error::loose non-rpm binary on PATH (Principle 2c)"; exit 1; }
            echo "backstop OK: every PATH binary is rpm-owned or an allowlisted wrapper"
          '

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          # DESKTOP_ENV only for the xrdp lineage; grd has a fixed DE (no arg).
          build-args: ${{ matrix.desktop_env && format('DESKTOP_ENV={0}', matrix.desktop_env) || '' }}
          # PRs validate the build only — never push a PR image to the registry.
          push: ${{ github.event_name != 'pull_request' }}
          # --no-cache on the monthly cron so RPMs + the Obsidian AppImage refresh.
          no-cache: ${{ github.event_name == 'schedule' }}
          tags: ${{ steps.meta.outputs.tags }}

      # Key-based cosign signing — signs THIS variant's IMMUTABLE digest with the
      # fleet cosign private key (CI secret COSIGN_PRIVATE_KEY + pass-phrase
      # COSIGN_PASSWORD). The host enforces it via policy.json -> sigstoreSigned
      # { keyData: <the matching public key> } using podman's NATIVE verification
      # (no cosign on the host). Keyless OIDC was dropped: podman's policy.json
      # matches only a subjectEmail, never a GitHub Actions workflow-URI identity.
      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/fedora-desktop
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE}@${DIGEST}"
